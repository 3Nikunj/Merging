services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?Set VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:?Set VITE_SUPABASE_ANON_KEY}
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=16m
      - /var/run:rw,noexec,nosuid,nodev,size=1m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_ORIGINS=${FRONTEND_ORIGINS:?Set FRONTEND_ORIGINS}
      - APP_ENV=production
      - SUPABASE_URL=${SUPABASE_URL:?Set SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

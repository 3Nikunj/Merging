version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aivalytics-unified-backend
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    environment:
      - APP_ENV=development
      - FRONTEND_ORIGIN=http://localhost:5173

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aivalytics-unified-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:8000
